<div class="chat-interface">
    <ul>
      <li *ngFor="let message of chatMessages">{{ message }}</li>
    </ul>
    <input [(ngModel)]="query" placeholder="Type a message..." />
    <button (click)="sendQuery()">Send</button>
  </div>
