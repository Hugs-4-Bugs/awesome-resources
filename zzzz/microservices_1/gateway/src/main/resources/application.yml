eureka:
  client:
    register-with-eureka: false
server:
  port: 8222
  spring:
    cloud:
      gateway:
        discovery:
          locator:
            enabled: true
        routes:
          - id: students
            uri: http://localhost:8090
            predicates:
              - path=/api/v1/students/**
          - id: schools
            uri: http://localhost:8070
            predicates:
              - path=/api/v1/schools/**

spring:
  cloud:
    config:
      enabled: false


