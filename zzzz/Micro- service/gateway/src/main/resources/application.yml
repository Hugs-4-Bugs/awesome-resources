
eureka:
  client:
    register-with-eureka: false
server:
  port: 8222
spring:
  application:
    name: gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
        discovery:
            locator:
              enabled: true

routes:
  - id: students
    uri: http://localhost:8071
    predicates:
      - Path=/api/v1/students/**
  - id: school
    uri: http://localhost:8061
    predicates:
      - Path=/api/v1/students/**

