# Application Name
spring.application.name=user-service

# Config Server (ensure the config server is running on port 9988)
spring.config.import=optional:configserver:http://localhost:9988/config

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/swiggyfood
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka Server Details (ensure Eureka server is running on port 8761)
eureka.client.serviceUrl.defaultZone=http://localhost:8761/swiggy/eureka
